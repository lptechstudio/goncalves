            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-on-surface text-surface-container-lowest antialiased min-h-screen flex items-center justify-center bg-watermark overflow-hidden">
<div class="content-layer w-full max-w-[440px] px-margin-mobile md:px-0">
<!-- Main Form Container -->
<div class="bg-surface-container-lowest/5 backdrop-blur-xl border border-surface-container-lowest/10 rounded-xl shadow-2xl p-8 md:p-12 w-full">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-10 text-center">
<!-- Using an elegant placeholder icon for the logo to avoid image load issues if IMAGE_1 isn't purely a logo graphic -->
<div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center mb-6 shadow-inner border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                        precision_manufacturing
                    </span>
</div>
<h1 class="font-headline-lg text-headline-lg md:font-headline-lg md:text-headline-lg text-surface-container-lowest tracking-tight mb-2">
                    Calçados Gonçalves
                </h1>
<p class="font-body-md text-body-md text-surface-dim/80">
                    Excelência em Calçados Femininos
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-surface-dim uppercase tracking-wider block ml-1" for="email">Email Corporativo</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-surface-dim/50">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-container-lowest/20 rounded bg-on-surface/50 text-surface-container-lowest placeholder-surface-dim/30 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors sm:text-sm font-body-md" id="email" name="email" placeholder="usuario@calcadosgoncalves.com.br" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between ml-1">
<label class="font-label-sm text-label-sm text-surface-dim uppercase tracking-wider block" for="password">Senha de Acesso</label>
<a class="font-label-sm text-label-sm text-primary hover:text-inverse-primary transition-colors" href="#">Esqueceu a senha?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-surface-dim/50">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-container-lowest/20 rounded bg-on-surface/50 text-surface-container-lowest placeholder-surface-dim/30 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors sm:text-sm font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded bg-primary hover:bg-[#A0001C] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-on-surface text-on-primary font-label-sm text-label-sm uppercase tracking-widest transition-all duration-200 shadow-lg shadow-primary/20" type="button" onclick="window.location.href='dashboard.html'">
                        Acessar Sistema
                    </button>
</div>
<!-- Security Note -->
<div class="flex items-center justify-center gap-2 pt-2 text-surface-dim/60">
<span class="material-symbols-outlined text-sm">shield</span>
<span class="font-label-sm text-label-sm">Acesso Restrito e Monitorado</span>
</div>
</form>
</div>
<!-- Footer -->

</div>
<script>
        // Optional JS for micro-interactions if needed.
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.material-symbols-outlined').classList.add('text-primary');
                this.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-surface-dim/50');
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                this.parentElement.querySelector('.material-symbols-outlined').classList.add('text-surface-dim/50');
            });
        });
    </script>



<script>
document.querySelector('button[type="button"]').addEventListener('click', function() {
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    if (!email || !password) {
        alert('Preencha email e senha!');
        return;
    }
    // Credenciais padrão
    if (email === 'admin@calcadosgoncalves.com.br' && password === 'admin123') {
        window.location.href = 'dashboard.html';
    } else {
        alert('Email ou senha incorretos!\nUse: admin@calcadosgoncalves.com.br / admin123');
    }
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        document.querySelector('button[type="button"]').click();
    }
});
</script>
